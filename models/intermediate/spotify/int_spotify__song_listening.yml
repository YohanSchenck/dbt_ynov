version: 2

models:
  - name: int_spotify__song_listening
    description: '{{ doc("int_spotify__song_listening") }}'
    columns:
      - name: song_id
        description: "Identifiant de la chanson écoutée."
      - name: listen_date
        description: "Date à laquelle la chanson a été écoutée."
      - name: minutes_listened
        description: "Nombre de minutes d'écoute de la chanson."
      - name: title
        description: "Titre de la chanson (en majuscules)."
      - name: artist
        description: "Nom de l'artiste (en majuscules)."
      - name: album
        description: "Nom de l'album."
      - name: genre
        description: "Genre de la chanson. Défaut à 'Unknown' si non spécifié."
