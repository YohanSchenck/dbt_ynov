version: 2

models:
  - name: int_sales_database__user
    description: '{{ doc("int_sales_database__user") }}'
    columns:
      - name: user_id
        description: "Clé primaire. Identifiant unique de l'utilisateur."
      - name: customer_city
        description: "Ville où se situe le client."
      - name: total_amount_order
        description: "Montant total dépensé par l'utilisateur sur l'ensemble de ses commandes. Défaut à 0.0."
      - name: total_orders
        description: "Nombre total de commandes distinctes passées par l'utilisateur. Défaut à 0."
