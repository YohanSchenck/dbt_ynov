version: 2

models:
  - name: stg_sales_database__order
    description: "Table staging des commandes de la base de données de vente. Chaque ligne représente une commande unique passée par un utilisateur."
    columns:
      - name: order_id
        description: "Clé primaire. Identifiant unique de chaque commande."
        data_tests:
          - unique
          - not_null
      - name: user_id
        description: "Clé étrangère vers stg_sales_database__user. Identifiant de l'utilisateur ayant passé la commande."
        data_tests:
          - not_null
          - relationships:
              name: fk_order_user_id
              arguments:
                to: ref('stg_sales_database__user')
                field: user_id
      - name: order_status
        description: "Statut actuel de la commande."
        data_tests:
          - accepted_values:
              name: accepted_values_order_status
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']
      - name: ordered_at
        description: "Horodatage de la commande. Converti depuis order_date via cast en timestamp."
      - name: order_approved_at
        description: "Horodatage de l'approbation de la commande. Converti depuis order_approved_date via cast en timestamp."
      - name: picked_up_at
        description: "Horodatage de la récupération de la commande. Converti depuis pickup_date via cast en timestamp."
      - name: delivered_at
        description: "Horodatage de la livraison de la commande. Converti depuis delivered_date via cast en timestamp."
      - name: estimated_delivery_on
        description: "Date estimée de livraison. Converti depuis estimated_time_delivery via cast en date."

  - name: stg_sales_database__order_item
    description: "Table staging des articles de commande. Chaque ligne représente un produit unique au sein d'une commande."
    columns:
      - name: order_item_id
        description: "Clé primaire. Calculée par concat(order_id, '-', product_id)."
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: "Clé étrangère vers stg_sales_database__order."
        data_tests:
          - not_null
          - relationships:
              name: fk_order_item_order_id
              arguments:
                to: ref('stg_sales_database__order')
                field: order_id
      - name: product_id
        description: "Clé étrangère vers stg_sales_database__product."
        data_tests:
          - not_null
          - relationships:
              name: fk_order_item_product_id
              arguments:
                to: ref('stg_sales_database__product')
                field: product_id
      - name: seller_id
        description: "Clé étrangère vers stg_sales_database__seller."
        data_tests:
          - not_null
          - relationships:
              name: fk_order_item_seller_id
              arguments:
                to: ref('stg_sales_database__seller')
                field: seller_id
      - name: quantity
        description: "Nombre d'unités commandées. Défaut à 0 si null (coalesce appliqué)."
      - name: price
        description: "Prix unitaire du produit. Défaut à 0.0 si null (coalesce appliqué)."
      - name: shipping_cost
        description: "Frais de livraison pour cet article. Défaut à 0.0 si null (coalesce appliqué)."
      - name: pickup_limit_at
        description: "Date limite de récupération par le vendeur. Converti depuis pickup_limit_date via cast en timestamp."

  - name: stg_sales_database__user
    description: "Table staging des utilisateurs. Chaque ligne représente un client unique."
    columns:
      - name: user_id
        description: "Clé primaire. Identifiant unique de chaque utilisateur (dérivé de user_name)."
        data_tests:
          - unique
          - not_null
      - name: customer_zip_code
        description: "Code postal du client."
      - name: customer_state
        description: "Code de l'état du client."
      - name: customer_city
        description: "Ville du client."

  - name: stg_sales_database__product
    description: "Table staging des produits. Chaque ligne représente un produit unique."
    columns:
      - name: product_id
        description: "Clé primaire. Identifiant unique de chaque produit."
        data_tests:
          - unique
          - not_null
      - name: product_name_length
        description: "Longueur du nom du produit. Défaut à 0 si null (coalesce appliqué)."
      - name: product_description_length
        description: "Longueur de la description du produit. Défaut à 0 si null (coalesce appliqué)."
      - name: product_photos_quantity
        description: "Nombre de photos du produit. Défaut à 0 si null (coalesce appliqué)."
      - name: product_weight_grams
        description: "Poids du produit en grammes. Défaut à 0 si null (coalesce appliqué)."
      - name: product_length_cm
        description: "Longueur du produit en centimètres. Défaut à 0 si null (coalesce appliqué)."
      - name: product_height_cm
        description: "Hauteur du produit en centimètres. Défaut à 0 si null (coalesce appliqué)."
      - name: product_width_cm
        description: "Largeur du produit en centimètres. Défaut à 0 si null (coalesce appliqué)."

  - name: stg_sales_database__seller
    description: "Table staging des vendeurs. Chaque ligne représente un vendeur unique."
    columns:
      - name: seller_id
        description: "Clé primaire. Identifiant unique de chaque vendeur."
        data_tests:
          - unique
          - not_null
      - name: seller_zip_code
        description: "Code postal du vendeur."
      - name: seller_city
        description: "Ville du vendeur."
      - name: seller_state
        description: "Code de l'état du vendeur."

  - name: stg_sales_database__payment
    description: "Table staging des paiements. Chaque ligne représente une transaction de paiement unique."
    columns:
      - name: payment_id
        description: "Clé primaire. Calculée par concat(order_id, '-', payment_sequential)."
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: "Clé étrangère vers stg_sales_database__order."
        data_tests:
          - not_null
          - relationships:
              name: fk_payment_order_id
              arguments:
                to: ref('stg_sales_database__order')
                field: order_id
      - name: payment_type
        description: "Type de paiement utilisé."
        data_tests:
          - accepted_values:
              name: accepted_values_payment_type
              arguments:
                values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']
      - name: payment_sequential
        description: "Numéro séquentiel du paiement au sein d'une commande."
      - name: payment_installments
        description: "Nombre de versements pour le paiement."
      - name: payment_value
        description: "Montant total du paiement. Défaut à 0.0 si null (coalesce appliqué)."

  - name: stg_sales_database__feedback
    description: "Table staging des retours clients. Chaque ligne représente un avis unique."
    columns:
      - name: feedback_id
        description: "Clé primaire. Calculée par concat(feedback_id, '_', order_id)."
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: "Clé étrangère vers stg_sales_database__order."
        data_tests:
          - not_null
          - relationships:
              name: fk_feedback_order_id
              arguments:
                to: ref('stg_sales_database__order')
                field: order_id
      - name: feedback_score
        description: "Note de satisfaction donnée par le client. Défaut à 0 si null (coalesce appliqué)."
        data_tests:
          - accepted_values:
              name: accepted_values_feedback_score
              arguments:
                values: [0, 1, 2, 3, 4, 5]
      - name: feedback_form_sent_at
        description: "Horodatage de l'envoi du formulaire de feedback. Converti depuis feedback_form_sent_date via cast en timestamp."
      - name: feedback_answer_at
        description: "Horodatage de la réponse au feedback. Converti depuis feedback_answer_date via cast en timestamp."
