version: 2

models:
  - name: mrt_order_daily_report
    description: '{{ doc("mrt_order_daily_report") }}'
    columns:
      - name: order_date
        description: "Date des commandes, convertie depuis order_created_at via cast en date."
      - name: account_manager
        description: "Nom du responsable de compte pour l'état. Défaut à 'No Manager Assigned'."
      - name: order_state
        description: "État où la commande a été passée (issu de user_state)."
      - name: total_orders
        description: "Nombre de commandes distinctes pour cette combinaison date/responsable/état."
      - name: average_items_per_order
        description: "Nombre moyen d'articles par commande, arrondi à 2 décimales."
      - name: average_feedback_score
        description: "Score moyen de satisfaction sur les commandes, arrondi à 2 décimales."
      - name: average_amount_spent_per_order
        description: "Montant moyen par commande, arrondi à 2 décimales."
