version: 2

models:
  - name: mrt_localbike__sales_daily
    description: >
      Ventes quotidiennes par magasin : nombre de commandes, clients,
      unités vendues, revenu et panier moyen. Commandes complétées uniquement.
    columns:
      - name: order_date
        description: Date de la commande.
        tests: [not_null]
      - name: store_id
        description: Magasin.
        tests: [not_null]
      - name: total_revenue
        description: Revenu total du jour pour le magasin.

  - name: mrt_localbike__sales_by_category
    description: >
      Répartition des ventes par magasin, catégorie et marque.
      Permet d'identifier le mix produit le plus performant.
    columns:
      - name: store_name
        tests: [not_null]
      - name: category_name
        tests: [not_null]
      - name: total_revenue
        description: Revenu total pour cette combinaison.

  - name: mrt_localbike__store_performance
    description: >
      KPIs par magasin : commandes, taux de complétion, revenu,
      clients, produits vendus, revenu par employé.
    columns:
      - name: store_id
        tests: [unique, not_null]
      - name: completion_rate_pct
        description: Pourcentage de commandes complétées.
      - name: revenue_per_staff
        description: Revenu moyen généré par employé.

  - name: mrt_localbike__staff_performance
    description: >
      Performance individuelle de chaque employé : commandes traitées,
      revenu généré, panier moyen, période d'activité.
    columns:
      - name: staff_id
        tests: [unique, not_null]
      - name: total_revenue
        description: Revenu total des commandes complétées traitées.

  - name: mrt_localbike__customer_segmentation
    description: >
      Segmentation client basée sur le revenu cumulé : VIP (≥10k),
      regular (≥3k), occasional, no_completed_order, no_order.
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: customer_segment
        description: Segment attribué au client.
        tests:
          - accepted_values:
              arguments:
                values: ['vip', 'regular', 'occasional', 'no_completed_order', 'no_order']

  - name: mrt_localbike__stock_alert
    description: >
      Alertes stock : produits en rupture avec des ventes (restock_urgent),
      stock faible et ventes élevées (restock_soon), surstock sans ventes
      (overstock_no_sales). Seules les lignes en alerte sont retournées.
    columns:
      - name: alert_type
        description: Type d'alerte stock.
        tests:
          - accepted_values:
              arguments:
                values: ['restock_urgent', 'restock_soon', 'overstock_no_sales']
